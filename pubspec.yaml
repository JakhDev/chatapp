name: chatapp
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  # Icons
  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.1.2

  # WebSocket
  web_socket_channel: ^3.0.1

  # Image picker (kamera + galereya)
  image_picker: ^1.1.2

  # Supabase
  supabase_flutter: ^2.12.4

  # Google Login
  google_sign_in: ^6.2.1

  # Rasmni kattalashtirib ochish uchun
  photo_view: ^0.15.0

  # Audio recording and playback
  record: ^6.2.0
  just_audio: ^0.9.36
  path_provider: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/bolt_rounded.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true